<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" role="img" aria-label="EURAM 2026 conference, Kristiansand, Norway">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16224a"/><stop offset="1" stop-color="#0e1a40"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#sky)"/>
  <circle cx="640" cy="120" r="46" fill="#E8B83A" opacity="0.95"/>
  <circle cx="640" cy="120" r="66" fill="#E8B83A" opacity="0.12"/>
  <!-- city / harbour silhouette -->
  <g fill="#1b2c58">
    <rect x="60" y="300" width="34" height="70"/><rect x="100" y="278" width="26" height="92"/>
    <rect x="132" y="312" width="40" height="58"/><rect x="180" y="288" width="24" height="82"/>
    <polygon points="210,288 224,266 238,288"/><rect x="214" y="288" width="20" height="82"/>
    <rect x="244" y="306" width="34" height="64"/><rect x="286" y="292" width="22" height="78"/>
    <rect x="316" y="316" width="44" height="54"/>
  </g>
  <!-- waves: "Navigating High Waters" -->
  <g fill="none" stroke-width="5" opacity="0.9">
    <path d="M0,392 Q100,368 200,392 T400,392 T600,392 T800,392" stroke="#4FC2C9"/>
    <path d="M0,420 Q100,398 200,420 T400,420 T600,420 T800,420" stroke="#3aa7ae" opacity="0.7"/>
    <path d="M0,450 Q100,430 200,450 T400,450 T600,450 T800,450" stroke="#2b8f97" opacity="0.55"/>
    <path d="M0,482 Q100,464 200,482 T400,482 T600,482 T800,482" stroke="#20707a" opacity="0.4"/>
  </g>
  <!-- little boat -->
  <g transform="translate(470,360)">
    <path d="M-26,10 L26,10 L18,26 L-18,26 Z" fill="#E8B83A"/>
    <rect x="-1" y="-24" width="2" height="34" fill="#cdd7ee"/>
    <path d="M2,-22 L20,4 L2,4 Z" fill="#ffffff"/>
  </g>
  <!-- text -->
  <text x="60" y="120" fill="#E8B83A" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="3">CONFERENCE · JUNE 2026</text>
  <text x="58" y="182" fill="#ffffff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="66" font-weight="800">EURAM 2026</text>
  <text x="60" y="222" fill="#CADCFC" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="500">Kristiansand, Norway · 16–19 June</text>
  <text x="60" y="256" fill="#8fa0c6" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-style="italic">“Navigating High Waters” — European Academy of Management</text>
</svg>
