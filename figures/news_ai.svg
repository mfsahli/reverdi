<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" role="img" aria-label="Illustration: heritage image dissolving into pixels and an AI network">
  <rect width="800" height="520" fill="#0e1a40"/>
  <rect width="800" height="520" fill="#12204a" opacity="0.5"/>
  <!-- framed heritage image on the left, dissolving into pixels to the right -->
  <g transform="translate(70,120)">
    <rect x="-14" y="-14" width="300" height="280" rx="10" fill="#f4ecd8" stroke="#E8B83A" stroke-width="6"/>
    <rect x="6" y="6" width="240" height="240" fill="#e7d9b6"/>
    <!-- simple 'old portrait' motif -->
    <circle cx="126" cy="96" r="46" fill="#b79b6a"/>
    <path d="M60,210 Q126,120 192,210 Z" fill="#b79b6a"/>
  </g>
  <!-- dissolving pixels -->
  <g fill="#E8B83A">
    <rect x="330" y="150" width="20" height="20" opacity="0.9"/>
    <rect x="360" y="185" width="16" height="16" opacity="0.7"/>
    <rect x="352" y="230" width="22" height="22" opacity="0.8"/>
    <rect x="392" y="140" width="14" height="14" opacity="0.6"/>
    <rect x="398" y="210" width="18" height="18" opacity="0.55"/>
    <rect x="384" y="270" width="14" height="14" opacity="0.5"/>
  </g>
  <!-- neural network on the right -->
  <g stroke="#4FC2C9" stroke-width="2" opacity="0.7">
    <line x1="470" y1="150" x2="600" y2="120"/><line x1="470" y1="150" x2="600" y2="210"/>
    <line x1="470" y1="230" x2="600" y2="120"/><line x1="470" y1="230" x2="600" y2="210"/>
    <line x1="470" y1="230" x2="600" y2="300"/><line x1="470" y1="310" x2="600" y2="210"/>
    <line x1="470" y1="310" x2="600" y2="300"/>
    <line x1="600" y1="120" x2="710" y2="200"/><line x1="600" y1="210" x2="710" y2="200"/>
    <line x1="600" y1="300" x2="710" y2="200"/><line x1="600" y1="210" x2="710" y2="290"/>
    <line x1="600" y1="300" x2="710" y2="290"/>
  </g>
  <g>
    <circle cx="470" cy="150" r="12" fill="#7C5CBF"/><circle cx="470" cy="230" r="12" fill="#7C5CBF"/><circle cx="470" cy="310" r="12" fill="#7C5CBF"/>
    <circle cx="600" cy="120" r="13" fill="#4FC2C9"/><circle cx="600" cy="210" r="13" fill="#4FC2C9"/><circle cx="600" cy="300" r="13" fill="#4FC2C9"/>
    <circle cx="710" cy="200" r="14" fill="#E8B83A"/><circle cx="710" cy="290" r="14" fill="#E8B83A"/>
  </g>
  <text x="70" y="440" fill="#CADCFC" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700">Real heritage in the age of generative AI</text>
  <text x="70" y="470" fill="#7f8fb6" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-style="italic">Illustration</text>
</svg>
